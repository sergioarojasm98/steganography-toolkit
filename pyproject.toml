[tool.ruff]
line-length = 100
target-version = "py310"
exclude = ["memory-bank", ".claude"]

[tool.ruff.lint]
select = [
  "E",  # pycodestyle errors
  "F",  # pyflakes
  "W",  # pycodestyle warnings
  "I",  # isort
  "B",  # flake8-bugbear
  "C4", # comprehensions
  "UP", # pyupgrade
]
ignore = [
  "E501",  # line too long (handled by formatter when possible)
  "E741",  # ambiguous variable name (l, I, O are common in image-processing code)
  "B008",  # function call in default argument
]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
